name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          # Keep in sync with docker-bake.hcl default
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint with pylint
        run: pylint meal_planner_app
      - name: Format with black
        run: black --check .
      - name: Test with pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          # Keep in sync with docker-bake.hcl default (Vite 7 + Tailwind 4 require >=20.19)
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Lint with eslint
        run: npm run lint
      - name: Format with prettier
        run: npm run format-check

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Validate docker-bake configuration
        run: docker buildx bake --print
      - name: Build prod image (smoke test)
        run: docker buildx bake prod --load
      - name: Build ci image (smoke test)
        run: docker buildx bake ci --load
