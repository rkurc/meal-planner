name: Integration and E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-in-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build E2E test image using bake (for version sync)
        run: docker buildx bake ci --load && docker tag meal-planner:ci meal-planner-e2e

      - name: Launch container (no-op entrypoint for control)
        run: |
          # Run the container with a no-op entrypoint so we have full control (no CMD interference
          # from start_and_seed.sh which backgrounds servers). This avoids port races when we
          # later exec gunicorn. Note: --entrypoint args must come *after* the image name.
          docker run -d --rm --name meal-planner-container --entrypoint tail -p 5000:5000 meal-planner-e2e -f /dev/null

      - name: Install Playwright browsers inside container
        run: docker exec -w /app/frontend meal-planner-container npx playwright install --with-deps

      - name: Start backend with gunicorn (serves API + /ui/ React)
        run: |
          # Pass TESTING=true so the /api/test/seed-db endpoint (used by E2E beforeEach)
          # is enabled in the running gunicorn process (in-memory DB is per-process).
          # The separate `python -m seed_db` seeds a different process and is now secondary.
          docker exec -d -e TESTING=true meal-planner-container gunicorn --bind 0.0.0.0:5000 meal_planner_app.main:app
          # Micro-sleep / process probe to allow gunicorn bind before the robust wait loop
          # (avoids any residual fork race even with inside-container curl checks).
          sleep 2

      - name: Wait inside container for backend readiness, then seed
        run: |
          # Robust inside-container wait (after gunicorn exec) using docker exec + curl (curl present in ci image).
          # Avoids host-side port publish race with published -p mapping or binding delays.
          # Separate step for clear CI logs + reliability.
          echo "Waiting for backend inside container..."
          for i in {1..30}; do
            if docker exec meal-planner-container curl -sf http://localhost:5000/api/recipes >/dev/null; then
              echo "Backend ready after $i tries"
              break
            fi
            sleep 1
          done
          # Seed now that API is responsive (creates recipes + Weekly Meal Plan for E2E coverage of meal-plan flows).
          docker exec meal-planner-container python -m meal_planner_app.seed_db

      - name: Run Playwright E2E tests inside container
        run: |
          # Run the Playwright tests inside the container, pointing at the Flask-served UI/API on 5000.
          # BASE_URL override makes the tests work against the unified server (local dev still uses 5173 via default in config).
          # Tests are now stable (inside wait + seed with Weekly Meal Plan + robust setup); run without || true so failures correctly fail the CI step.
          echo "Running Playwright tests..."
          docker exec -e BASE_URL=http://localhost:5000 -w /app/frontend meal-planner-container npx playwright test

      - name: Copy test results from container
        if: always()
        run: |
          # Copy the test results from the container to the runner host
          docker cp meal-planner-container:/app/frontend/test-results ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: ./test-results/
          retention-days: 7

      - name: Stop Container
        if: always()
        run: |
          docker stop meal-planner-container
